<!DOCTYPE html>
<html>
<head>
    <title>Berlin Foodie Map - Leaflet Edition</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 60vh; width: 100%; } /* 地圖高度佔螢幕 60% */
        .info-panel { padding: 20px; background: #fff; text-align: center; }
        .res-card { 
            background: #f9f9f9; border-left: 5px solid #ff5a5f; 
            padding: 10px; margin: 10px auto; max-width: 400px; text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="map"></div> <div class="info-panel">
    <h2 id="area-name">請點擊地圖上的行政區</h2>
    <div id="restaurant-list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 3. 初始化地圖：中心點設在柏林 [緯度, 經度]
    var map = L.map('map').setView([52.5200, 13.4050], 10);

    // 4. 載入地圖底圖 (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 5. 餐廳資料
    const venues = [
        { name: "Mustafa's Gemüsedöner", area: "Friedrichshain-Kreuzberg", lat: 52.4938, lng: 13.3892 },
        { name: "Zeit für Brot", area: "Mitte", lat: 52.5236, lng: 13.4042 },
        { name: "Gazzo Pizza", area: "Neukölln", lat: 52.4842, lng: 13.4215 }
    ];

    // 6. 模擬「行政區」功能
    // 在專業版中，我們會載入 GeoJSON。這裡我們先放 Marker (大頭針) 示範
    venues.forEach(shop => {
        L.marker([shop.lat, shop.lng]).addTo(map)
            .bindPopup(`<b>${shop.name}</b><br>${shop.area}`)
            .on('click', function() {
                showDetail(shop.area, shop.name);
            });
    });

    function showDetail(area, name) {
        document.getElementById('area-name').innerText = area;
        document.getElementById('restaurant-list').innerHTML = `
            <div class="res-card">
                <strong>${name}</strong><br>
                這家店在 ${area} 很有名！
            </div>
        `;
    }
</script>

</body>
</html>
