<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlin Food Guide 3.0 🥨</title>
    <style>
        :root {
            /* 定義現代、柔和的顏色組合 */
            --mitte: rgba(144, 202, 249, 0.9);      /* 藍色 */
            --kreuzberg: rgba(165, 214, 167, 0.9);  /* 綠色 */
            --pankow: rgba(255, 245, 157, 0.9);     /* 黃色 */
            --charlottenburg: rgba(244, 143, 177, 0.9); /* 粉色 */
            --border: rgba(255, 255, 255, 0.5);
            --bg: #f8f9fa;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg); text-align: center; color: #333; }
        .header { background: #000; color: white; padding: 40px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 2rem; }

        /* 地圖容器樣式 */
        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px); /* 磨砂玻璃效果核心 */
            border: 1px solid var(--border);
        }

        /* SVG 區域樣式 */
        .district {
            stroke: #fff;
            stroke-width: 0.5;
            transition: 0.3s;
            cursor: pointer;
        }
        .district:hover {
            transform: scale(1.05); /* 懸停時稍微放大 */
            fill-opacity: 0.8;
            stroke-width: 1;
        }
        
        /* 為不同區域指定不同顏色 */
        #mitte-path { fill: var(--mitte); }
        #kreuzberg-path { fill: var(--kreuzberg); }
        #pankow-path { fill: var(--pankow); }
        #charlottenburg-path { fill: var(--charlottenburg); }

        .results { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: white; margin-bottom: 12px; padding: 15px; border-radius: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="header">
    <h1>Berlin Neighborhood Guide</h1>
    <p>Tap a district on the map to find local vibes.</p>
</div>

<div class="map-wrapper">
    <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
        <path id="pankow-path" class="district" d="M30,5 L70,5 L80,25 L50,35 L20,25 Z" onclick="selectDistrict('Pankow', this)" />
        
        <path id="mitte-path" class="district" d="M40,30 L60,30 L65,45 L35,45 Z" onclick="selectDistrict('Mitte', this)" />
        
        <path id="kreuzberg-path" class="district" d="M65,35 L95,35 L90,60 L65,55 Z" onclick="selectDistrict('Kreuzberg', this)" />
        
        <path id="charlottenburg-path" class="district" d="M5,35 L35,35 L35,55 L10,60 Z" onclick="selectDistrict('Charlottenburg', this)" />
    </svg>
</div>

<h2 id="district-title">All Spots</h2>
<div id="results" class="results"></div>

<script>
    const venues = [
        { name: "Mustafa's Kebab", district: "Kreuzberg", type: "Middle Eastern" },
        { name: "Zeit für Brot", district: "Mitte", type: "Bakery" },
        { name: "Lon-Men's Noodle House", district: "Charlottenburg", type: "Asian" },
        { name: "UFO Wedding", district: "Pankow", type: "Asian" }
    ];

    function selectDistrict(districtName, element) {
        document.getElementById('district-title').innerText = "Vibe in " + districtName;
        const list = document.getElementById('results');
        list.innerHTML = "";
        
        const filtered = venues.filter(v => v.district === districtName);
        filtered.forEach(v => {
            list.innerHTML += `<div class="card"><strong>${v.name}</strong><br>${v.type}</div>`;
        });
    }
</script>

</body>
</html>
