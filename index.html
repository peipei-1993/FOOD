<style>
    .map-container {
        max-width: 700px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
        border-radius: 30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }

    /* SVG 區塊基本樣式 */
    .district-path {
        fill: #efefef;
        stroke: #fff;
        stroke-width: 0.8;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    /* 滑鼠移入：變色效果 */
    .district-path:hover {
        fill: #ff5a5f; /* 柏林紅 */
        filter: drop-shadow(0 0 5px rgba(255,90,95,0.5));
    }

    /* 被選中時：固定顏色 */
    .district-path.active {
        fill: #333;
        stroke: #000;
    }

    .district-name {
        font-size: 3px;
        fill: #999;
        pointer-events: none;
        text-transform: uppercase;
        font-weight: bold;
    }
</style>

<div class="map-container">
    <h2 id="current-selection">Select a District</h2>
    
    <svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
        <path id="Reinickendorf" class="district-path" d="M20,5 L45,5 L50,25 L25,30 Z" onclick="mapClick('Reinickendorf', this)" />
        <path id="Pankow" class="district-path" d="M46,5 L75,5 L80,25 L51,30 Z" onclick="mapClick('Pankow', this)" />

        <path id="Mitte" class="district-path" d="M40,31 L60,31 L65,45 L35,45 Z" onclick="mapClick('Mitte', this)" />
        
        <path id="Spandau" class="district-path" d="M2,25 L24,25 L24,55 L5,60 Z" onclick="mapClick('Spandau', this)" />
        <path id="Charlottenburg" class="district-path" d="M25,31 L39,31 L34,50 L25,50 Z" onclick="mapClick('Charlottenburg', this)" />

        <path id="Lichtenberg" class="district-path" d="M76,31 L95,31 L100,50 L81,50 Z" onclick="mapClick('Lichtenberg', this)" />
        <path id="Friedrichshain-Xberg" class="district-path" d="M61,31 L75,31 L80,45 L66,45 Z" onclick="mapClick('Kreuzberg', this)" />

        <path id="Neukölln" class="district-path" d="M66,46 L80,46 L75,70 L60,70 Z" onclick="mapClick('Neukölln', this)" />
        <path id="Tempelhof" class="district-path" d="M45,46 L65,46 L55,75 L40,70 Z" onclick="mapClick('Tempelhof', this)" />
        <path id="Steglitz" class="district-path" d="M25,51 L44,51 L35,75 L20,70 Z" onclick="mapClick('Steglitz', this)" />
        
        <text x="46" y="38" class="district-name">Mitte</text>
        <text x="65" y="58" class="district-name">NK</text>
    </svg>
</div>

<script>
    function mapClick(name, el) {
        // 1. 更新標題
        document.getElementById('current-selection').innerText = "Exploring: " + name;
        
        // 2. 清除所有區域的 active 狀態，並把點擊的這區變黑
        document.querySelectorAll('.district-path').forEach(p => p.classList.remove('active'));
        el.classList.add('active');

        // 3. 呼叫過濾函數 (我們下一步要寫的)
        filterRestaurantsByArea(name);
    }
</script>
