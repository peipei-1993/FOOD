<script>
    // 1. 初始化地圖：設定中心在德國 [51.1657, 10.4515]，縮放層級為 6
    var map = L.map('main-map').setView([51.1657, 10.4515], 6);

    // 2. 載入文青風格的地圖皮膚 (CartoDB Positron - 淺色簡約版)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 3. 定義六大城市資料 (經緯度)
    var cities = [
        { name: "柏林 Berlin", coords: [52.5200, 13.4050], zoom: 12 },
        { name: "漢堡 Hamburg", coords: [53.5511, 9.9937], zoom: 12 },
        { name: "慕尼黑 Munich", coords: [48.1351, 11.5820], zoom: 12 },
        { name: "科隆 Cologne", coords: [50.9375, 6.9603], zoom: 12 },
        { name: "法蘭克福 Frankfurt", coords: [50.1109, 8.6821], zoom: 12 },
        { name: "斯圖加特 Stuttgart", coords: [48.7758, 9.1829], zoom: 12 }
    ];

    // 4. 用迴圈把這六個城市「畫」在地圖上
    cities.forEach(function(city) {
        // 在地圖上增加一個標記
        var marker = L.marker(city.coords).addTo(map);
        
        // 加上提示文字
        marker.bindPopup("<b>" + city.name + "</b><br>點擊進入城市地圖");

        // 監聽點擊事件：點了之後「飛過去」
        marker.on('click', function() {
            map.flyTo(city.coords, city.zoom, {
                animate: true,
                duration: 1.5 // 飛行持續 1.5 秒，很有儀式感
            });
        });
    });
</script>
