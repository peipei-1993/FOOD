<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Germany Food Explorer 🇩🇪</title>
    <style>
        :root { --de-black: #000000; --de-red: #dd0000; --de-gold: #ffce00; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f0f0f0; text-align: center; }
        
        .header { background: var(--de-black); color: white; padding: 30px; }
        
        /* 德國地圖容器 */
        .map-container { position: relative; width: 300px; height: 400px; margin: 20px auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        svg { width: 100%; height: 100%; fill: #eee; stroke: #ccc; stroke-width: 1; }
        
        /* 方向標籤分線 */
        .direction-line { position: absolute; cursor: pointer; transition: 0.3s; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; background: white; border: 1px solid #ddd; }
        .direction-line:hover { background: var(--de-red); color: white; border-color: var(--de-red); transform: scale(1.1); }
        .direction-line.active { background: var(--de-black); color: white; }

        /* 定位方向按鈕 */
        .north { top: 10%; left: 50%; transform: translateX(-50%); }
        .south { bottom: 10%; left: 50%; transform: translateX(-50%); }
        .west { left: 5%; top: 50%; transform: translateY(-50%); }
        .east { right: 5%; top: 50%; transform: translateY(-50%); }

        /* 餐廳列表 */
        .results { max-width: 500px; margin: 0 auto; padding: 20px; }
        .card { background: white; margin-bottom: 12px; padding: 15px; border-radius: 12px; text-align: left; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--de-gold); }
    </style>
</head>
<body>

<div class="header">
    <h1>Germany Food Explorer</h1>
    <p>Select a direction to find local vibes</p>
</div>

<div class="map-container">
    <svg viewBox="0 0 100 120">
        <path id="germany-map" d="M30,10 L70,10 L85,40 L90,80 L70,110 L30,110 L10,80 L15,40 Z" />
    </svg>

    <div class="direction-line north" onclick="filterByDir('North', this)">NORTH (Hamburg)</div>
    <div class="direction-line south" onclick="filterByDir('South', this)">SOUTH (Munich)</div>
    <div class="direction-line west" onclick="filterByDir('West', this)">WEST (Cologne)</div>
    <div class="direction-line east" onclick="filterByDir('East', this)">EAST (Berlin)</div>
</div>

<h2 id="dir-title">Exploring All Regions</h2>
<div id="results" class="results"></div>
