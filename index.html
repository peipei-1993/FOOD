<style>
    /* 現代深色風格地圖容器 */
    .map-section {
        background: #1a1a1a;
        padding: 40px 20px;
        border-radius: 24px;
        margin: 20px auto;
        max-width: 800px;
    }

    /* SVG 地圖樣式 */
    #berlin-svg {
        width: 100%;
        height: auto;
        filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
    }

    /* 行政區路徑樣式 */
    .district {
        fill: #333; /* 預設深灰色 */
        stroke: #444;
        stroke-width: 0.5;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    /* 滑鼠移上去的效果 (Hover) */
    .district:hover {
        fill: #ff5a5f; /* 柏林紅 */
        stroke: #fff;
        filter: brightness(1.2);
    }

    /* 被選中時的效果 (Active) */
    .district.active {
        fill: #ff5a5f;
        stroke: #fff;
        stroke-width: 1;
    }

    .district-label {
        fill: #888;
        font-size: 3px;
        pointer-events: none;
        text-transform: uppercase;
    }
</style>

<div class="map-section">
    <h2 style="color:white; margin-bottom:30px;">Berlin Gastronomy Map</h2>
    <svg id="berlin-svg" viewBox="0 0 100 80">
        <path id="Mitte" class="district" d="M42,32 L58,32 L62,45 L38,45 Z" onclick="handleMapClick('Mitte', this)" />
        <path id="Pankow" class="district" d="M45,5 L75,5 L80,30 L50,35 L35,25 Z" onclick="handleMapClick('Pankow', this)" />
        <path id="Friedrichshain-Xberg" class="district" d="M60,35 L85,35 L90,55 L65,50 Z" onclick="handleMapClick('Kreuzberg', this)" />
        <path id="Charlottenburg" class="district" d="M10,30 L40,30 L35,50 L15,55 Z" onclick="handleMapClick('Charlottenburg', this)" />
        <path id="Neukölln" class="district" d="M62,52 L88,57 L75,75 L55,75 Z" onclick="handleMapClick('Neukölln', this)" />
        
        <text x="46" y="40" class="district-label">Mitte</text>
        <text x="55" y="18" class="district-label">Pankow</text>
        <text x="68" y="45" class="district-label">X-Berg</text>
        <text x="18" y="42" class="district-label">West</text>
        <text x="63" y="68" class="district-label">Neukölln</text>
    </svg>
</div>

<script>
    function handleMapClick(name, element) {
        // 1. 視覺回饋：移除其他區的 active，給點擊的區加上 active
        document.querySelectorAll('.district').forEach(d => d.classList.remove('active'));
        element.classList.add('active');

        // 2. 觸發你原本的過濾邏輯
        filterByDistrict(name); 
    }
</script>
